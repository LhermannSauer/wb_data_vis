<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Global Trade Connections & Development</title>
<script src="https://d3js.org/d3.v7.min.js"></script>
<script src="https://d3js.org/topojson.v3.min.js"></script>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: 'Segoe UI', system-ui, sans-serif; background: #0a1628; color: #e0e6ed; }
  h1 { text-align: center; padding: 18px 0 4px; font-size: 1.5rem; font-weight: 600; color: #f0f4f8; }
  .subtitle { text-align: center; font-size: 0.85rem; color: #8899aa; margin-bottom: 12px; }
  #map-container { display: flex; justify-content: center; }
  svg { background: #0a1628; }
  .land { fill: #172a45; stroke: #1e3a5f; stroke-width: 0.4; }
  .graticule { fill: none; stroke: #112240; stroke-width: 0.3; }
  .arc { fill: none; stroke-linecap: round; opacity: 0.6; }
  .arc:hover { opacity: 1; }
  .node-circle { stroke: #0a1628; stroke-width: 1; cursor: pointer; }
  .node-circle:hover { stroke: #fff; stroke-width: 2; }
  .tooltip {
    position: absolute; pointer-events: none; background: rgba(10,22,40,0.95);
    border: 1px solid #2a4a6b; border-radius: 6px; padding: 10px 14px;
    font-size: 0.8rem; line-height: 1.5; max-width: 260px; display: none;
  }
  .tooltip .country-name { font-weight: 700; font-size: 0.95rem; color: #64ffda; }
  .tooltip .metric { color: #8899aa; }
  .tooltip .value { color: #e0e6ed; font-weight: 600; }
  .legend { font-size: 0.75rem; }
  .legend-title { font-weight: 600; fill: #8899aa; }
  .controls { display: flex; justify-content: center; gap: 20px; margin: 8px 0; flex-wrap: wrap; }
  .control-group { display: flex; align-items: center; gap: 6px; }
  .control-group label { font-size: 0.8rem; color: #8899aa; }
  .control-group select, .control-group input {
    background: #172a45; border: 1px solid #2a4a6b; color: #e0e6ed;
    padding: 4px 8px; border-radius: 4px; font-size: 0.8rem;
  }
</style>
</head>
<body>
<h1>Is Trade a Pillar of Development?</h1>
<p class="subtitle">Connection map: trade corridors between top exporting nations &mdash; node color = HDI, node size = export volume</p>
<div class="controls">
  <div class="control-group">
    <label>Color by:</label>
    <select id="color-metric">
      <option value="hdi" selected>Human Development Index</option>
      <option value="trade_pct_gdp">Trade % of GDP</option>
      <option value="fdi_inflows_pct_gdp">FDI Inflows % GDP</option>
      <option value="wealth_pc">Wealth per capita</option>
    </select>
  </div>
  <div class="control-group">
    <label>Show arcs:</label>
    <select id="arc-filter">
      <option value="all" selected>All</option>
      <option value="hub-hub">Hub-to-Hub only</option>
      <option value="spoke">Spoke only</option>
    </select>
  </div>
</div>
<div id="map-container"></div>
<div class="tooltip" id="tooltip"></div>

<script>
const W = Math.min(1100, window.innerWidth - 20), H = 560;

const projection = d3.geoNaturalEarth1()
  .scale(W / 5.8)
  .translate([W / 2, H / 2]);

const path = d3.geoPath().projection(projection);

const svg = d3.select("#map-container").append("svg")
  .attr("width", W).attr("height", H);

const tooltip = d3.select("#tooltip");

const colorScales = {
  hdi: d3.scaleSequential(d3.interpolateViridis).domain([0.3, 0.95]),
  trade_pct_gdp: d3.scaleSequential(d3.interpolateYlOrRd).domain([0, 200]),
  fdi_inflows_pct_gdp: d3.scaleSequential(d3.interpolatePlasma).domain([-5, 30]),
  wealth_pc: d3.scaleSequential(d3.interpolateCividis).domain([0, 500000]),
};

const colorLabels = {
  hdi: "HDI", trade_pct_gdp: "Trade % GDP",
  fdi_inflows_pct_gdp: "FDI Inflows % GDP", wealth_pc: "Wealth/capita (USD)"
};

const sizeScale = d3.scaleSqrt().domain([0, 2600000000]).range([2, 18]);

const arcWidthScale = d3.scaleSqrt().domain([0, 2600000000]).range([0.5, 4]);

Promise.all([
  d3.json("https://cdn.jsdelivr.net/npm/world-atlas@2/countries-110m.json"),
  d3.json("data.json")
]).then(([world, data]) => {
  const land = topojson.feature(world, world.objects.countries);
  const graticule = d3.geoGraticule();

  svg.append("path").datum(graticule()).attr("class", "graticule").attr("d", path);
  svg.append("g").selectAll("path").data(land.features).join("path")
    .attr("class", "land").attr("d", path);

  const nodeMap = {};
  data.nodes.forEach(n => { nodeMap[n.id] = n; });

  const gArcs = svg.append("g").attr("class", "arcs-layer");
  const gNodes = svg.append("g").attr("class", "nodes-layer");

  function arcPath(src, tgt) {
    const s = projection([src.lon, src.lat]);
    const t = projection([tgt.lon, tgt.lat]);
    if (!s || !t) return null;
    return { type: "LineString", coordinates: [[src.lon, src.lat], [tgt.lon, tgt.lat]] };
  }

  function render() {
    const colorMetric = d3.select("#color-metric").node().value;
    const arcFilter = d3.select("#arc-filter").node().value;
    const cScale = colorScales[colorMetric];

    const filteredConns = arcFilter === "all"
      ? data.connections
      : data.connections.filter(c => c.type === arcFilter);

    const arcs = gArcs.selectAll(".arc").data(filteredConns, d => d.source + "-" + d.target);
    arcs.exit().transition().duration(300).attr("opacity", 0).remove();
    arcs.enter().append("path")
      .attr("class", "arc")
      .attr("d", d => {
        const s = nodeMap[d.source], t = nodeMap[d.target];
        const geo = arcPath(s, t);
        return geo ? path(geo) : null;
      })
      .attr("stroke", d => {
        const s = nodeMap[d.source];
        const v = s[colorMetric];
        return v != null ? cScale(v) : "#334455";
      })
      .attr("stroke-width", d => arcWidthScale(d.value))
      .attr("opacity", 0)
      .transition().duration(600).attr("opacity", 0.5);

    arcs.transition().duration(400)
      .attr("stroke", d => {
        const s = nodeMap[d.source];
        const v = s[colorMetric];
        return v != null ? cScale(v) : "#334455";
      });

    const connectedIds = new Set();
    filteredConns.forEach(c => { connectedIds.add(c.source); connectedIds.add(c.target); });
    const visibleNodes = data.nodes.filter(n =>
      connectedIds.has(n.id) || (n.exports_usd_k && n.exports_usd_k > 50000000)
    );

    const circles = gNodes.selectAll(".node-circle").data(visibleNodes, d => d.id);
    circles.exit().transition().duration(300).attr("r", 0).remove();

    const enter = circles.enter().append("circle")
      .attr("class", "node-circle")
      .attr("cx", d => { const p = projection([d.lon, d.lat]); return p ? p[0] : -100; })
      .attr("cy", d => { const p = projection([d.lon, d.lat]); return p ? p[1] : -100; })
      .attr("r", 0);

    enter.merge(circles).transition().duration(500)
      .attr("r", d => sizeScale(d.exports_usd_k || 0))
      .attr("fill", d => {
        const v = d[colorMetric];
        return v != null ? cScale(v) : "#334455";
      });

    enter.on("mouseover", (e, d) => {
      const fmt = v => v != null ? d3.format(",.2f")(v) : "N/A";
      const fmtK = v => v != null ? "$" + d3.format(",.0f")(v / 1000) + "M" : "N/A";
      tooltip.style("display", "block").html(`
        <div class="country-name">${d.id} (${d.region_name})</div>
        <div><span class="metric">HDI:</span> <span class="value">${fmt(d.hdi)}</span></div>
        <div><span class="metric">Exports:</span> <span class="value">${fmtK(d.exports_usd_k)}</span></div>
        <div><span class="metric">Trade % GDP:</span> <span class="value">${fmt(d.trade_pct_gdp)}%</span></div>
        <div><span class="metric">FDI Inflows % GDP:</span> <span class="value">${fmt(d.fdi_inflows_pct_gdp)}%</span></div>
        <div><span class="metric">Wealth/cap:</span> <span class="value">${d.wealth_pc != null ? "$" + d3.format(",.0f")(d.wealth_pc) : "N/A"}</span></div>
      `);
    })
    .on("mousemove", e => {
      tooltip.style("left", (e.pageX + 12) + "px").style("top", (e.pageY - 10) + "px");
    })
    .on("mouseout", () => tooltip.style("display", "none"));

    renderLegend(cScale, colorLabels[colorMetric]);
  }

  function renderLegend(scale, label) {
    svg.selectAll(".legend").remove();
    const lg = svg.append("g").attr("class", "legend").attr("transform", `translate(20, ${H - 60})`);
    const w = 180, h = 10;
    const defs = svg.append("defs");
    const grad = defs.append("linearGradient").attr("id", "lg");
    [0, 0.25, 0.5, 0.75, 1].forEach(t => {
      grad.append("stop").attr("offset", `${t * 100}%`)
        .attr("stop-color", scale(scale.domain()[0] + t * (scale.domain()[1] - scale.domain()[0])));
    });
    lg.append("rect").attr("width", w).attr("height", h).attr("rx", 3).style("fill", "url(#lg)");
    lg.append("text").attr("class", "legend-title").attr("y", -5).text(label);
    lg.append("text").attr("y", h + 12).attr("fill", "#8899aa").attr("font-size", "0.65rem")
      .text(d3.format(".2f")(scale.domain()[0]));
    lg.append("text").attr("x", w).attr("y", h + 12).attr("text-anchor", "end")
      .attr("fill", "#8899aa").attr("font-size", "0.65rem")
      .text(d3.format(",.0f")(scale.domain()[1]));
  }

  render();
  d3.select("#color-metric").on("change", render);
  d3.select("#arc-filter").on("change", render);
});
</script>
</body>
</html>
